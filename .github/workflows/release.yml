name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            target: darwin-arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            target: darwin-amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            target: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/sandgardenhq/find-the-gaps/internal/cli.version=${VERSION}" \
            -o dist/ftg \
            ./cmd/find-the-gaps

      - name: Verify version stamp
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          OUT=$(./dist/ftg --version)
          echo "$OUT"
          echo "$OUT" | grep -F "${VERSION}" >/dev/null

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd dist
          tar -czf "find-the-gaps_${VERSION}_${TARGET}.tar.gz" ftg
          rm ftg

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/find-the-gaps_*.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftg-${{ matrix.target }}
          path: dist/find-the-gaps_*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum -- *.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/checksums.txt
