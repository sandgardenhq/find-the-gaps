# fly.toml app configuration file generated for find-the-gaps on 2026-05-12T13:17:42-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'find-the-gaps'
primary_region = 'ord'

[build]
  [build.args]
    GO_VERSION = '1.26.2'

# Named process groups. The image's ENTRYPOINT is `ftg`, so each value
# below is appended to it. Override per-invocation with:
#   fly machine run <image> --process-group analyze -- <extra args>
[processes]
  analyze = 'analyze'
  doctor  = 'doctor'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
